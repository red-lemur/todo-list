<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>
      {{ title }}
    </mat-card-title>
    <ng-content select=".card-title-icon"></ng-content>
  </mat-card-header>
  <mat-card-content>
    <p>{{ content }}</p>
  </mat-card-content>
  <mat-card-actions>
    <ng-content select=".card-actions"></ng-content>
  </mat-card-actions>
</mat-card>
